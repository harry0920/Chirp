# Cleanup-model selection benchmark candidates.
#
# `binary` and `model` are filesystem paths to llama-server and the GGUF.
# Sampling params should match each model's official model-card recommendation
# for non-thinking instruct mode. The plan deliberately uses the same SYSTEM
# PROMPT across all candidates (this is a selection benchmark, not a prompt
# tuning benchmark) — only sampling differs.
#
# Phase A.5 ships with one entry: the current production baseline. Phase B
# adds the other 6 candidates after the user OKs the ~24 GB download.

candidates:
  qwen3-0.6b:
    # Current production baseline (Chirp v1.3.0 dev branch).
    # Same GGUF the running app uses — no extra disk required.
    binary: C:/Users/dutch/AppData/Roaming/com.chirp.app/llm/llama-server.exe
    model:  C:/Users/dutch/AppData/Roaming/com.chirp.app/llm/Qwen3-0.6B-Q4_K_M.gguf
    model_id: qwen3-0.6b
    ctx_size: 2048
    n_predict: 512
    gpu_layers: 99
    reasoning_budget: 0
    sampling:
      # Qwen team explicitly warns against greedy on Qwen3. These values are
      # the production sampler from src-tauri/src/llm.rs:564-572 (Qwen3
      # non-thinking model card recommendation).
      temperature: 0.7
      top_p: 0.8
      top_k: 20
      min_p: 0.0
