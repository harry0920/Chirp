# Cleanup-model selection benchmark candidates.
#
# `binary` and `model` are filesystem paths to llama-server and the GGUF.
# Sampling params should match each model's official model-card recommendation
# for non-thinking instruct mode. The plan deliberately uses the same SYSTEM
# PROMPT across all candidates (this is a selection benchmark, not a prompt
# tuning benchmark) — only sampling differs.
#
# Phase A.5 ships with one entry: the current production baseline. Phase B
# adds the other 6 candidates after the user OKs the ~24 GB download.

# All non-baseline candidates point at the chirp-bench/models/<name>/ dir
# populated by download_candidates.py. They share the same llama-server
# binary as production (b8653 from llama.cpp).

candidates:
  qwen3-0.6b:
    # Current production baseline (Chirp v1.3.0 dev branch).
    # Same GGUF the running app uses — no extra disk required.
    binary: C:/Users/dutch/AppData/Roaming/com.chirp.app/llm/llama-server.exe
    model:  C:/Users/dutch/AppData/Roaming/com.chirp.app/llm/Qwen3-0.6B-Q4_K_M.gguf
    model_id: qwen3-0.6b
    ctx_size: 2048
    n_predict: 512
    gpu_layers: 99
    reasoning_budget: 0
    sampling:
      # Qwen team explicitly warns against greedy on Qwen3. These values are
      # the production sampler from src-tauri/src/llm.rs:564-572 (Qwen3
      # non-thinking model card recommendation).
      temperature: 0.7
      top_p: 0.8
      top_k: 20
      min_p: 0.0

  qwen2.5-3b:
    # The actual production model from v1.2.5 — the user's last known
    # working configuration. Reference baseline for "what worked before".
    binary: C:/Users/dutch/AppData/Roaming/com.chirp.app/llm/llama-server.exe
    model:  C:/Users/dutch/chirp-bench/models/qwen2.5-3b/qwen2.5-3b-instruct-q4_k_m.gguf
    model_id: qwen2.5-3b
    ctx_size: 2048
    n_predict: 512
    gpu_layers: 99
    reasoning_budget: 0
    sampling:
      # Qwen 2.5 has no thinking mode — these are the official model card
      # recommended sampler settings.
      temperature: 0.7
      top_p: 0.8
      top_k: 20
      min_p: 0.0

  qwen3-1.7b:
    # NOTE: Qwen did NOT release a 2507-update for the 1.7B size — the
    # original Qwen3-1.7B is the only option. Has thinking mode by default
    # so reasoning_budget=0 is critical.
    binary: C:/Users/dutch/AppData/Roaming/com.chirp.app/llm/llama-server.exe
    model:  C:/Users/dutch/chirp-bench/models/qwen3-1.7b/Qwen3-1.7B-Q4_K_M.gguf
    model_id: qwen3-1.7b
    ctx_size: 2048
    n_predict: 512
    gpu_layers: 99
    reasoning_budget: 0
    sampling:
      temperature: 0.7
      top_p: 0.8
      top_k: 20
      min_p: 0.0

  qwen3-4b-instruct-2507:
    # Qwen3-4B-Instruct-2507 is explicitly the non-thinking variant —
    # no reasoning suppression hack needed in principle, but pass
    # reasoning_budget=0 anyway as a belt-and-suspenders.
    binary: C:/Users/dutch/AppData/Roaming/com.chirp.app/llm/llama-server.exe
    model:  C:/Users/dutch/chirp-bench/models/qwen3-4b-instruct-2507/Qwen3-4B-Instruct-2507-Q4_K_M.gguf
    model_id: qwen3-4b-instruct-2507
    ctx_size: 2048
    n_predict: 512
    gpu_layers: 99
    reasoning_budget: 0
    sampling:
      # Qwen3-4B-Instruct-2507 model-card recommended sampling.
      temperature: 0.7
      top_p: 0.8
      top_k: 20
      min_p: 0.0

  gemma-4-e2b-it:
    # Same model the previous Chirp v1.3.0 ship cycle used. Phase B
    # control / direct sibling-comparator to E4B.
    binary: C:/Users/dutch/AppData/Roaming/com.chirp.app/llm/llama-server.exe
    model:  C:/Users/dutch/chirp-bench/models/gemma-4-e2b-it/gemma-4-E2B-it-Q4_K_M.gguf
    model_id: gemma-4-e2b-it
    ctx_size: 2048
    n_predict: 512
    gpu_layers: 99
    reasoning_budget: 0
    sampling:
      temperature: 1.0
      top_p: 0.95
      top_k: 64
      min_p: 0.0

  gemma-4-e4b-it:
